  - slug: evidence-display-sanitization
    description: 统一 supporting evidence 展示清洗，避免 HTML 渲染残留进入用户可见输出。
    depends_on:
      - codestable-development-docs
    status: done
    feature: 2026-05-10-evidence-display-sanitization
    minimal_loop: false
  - slug: query-context-clarification-contract
    description: 定义 query-context 对短缩写歧义问题的输出契约，并与 answer-query 和 UI 对齐。
    depends_on:
      - codestable-development-docs
    status: done
