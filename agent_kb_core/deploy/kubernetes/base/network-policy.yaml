apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agent-kb-core
  namespace: agent-kb
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: agent-kb-core
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
        - protocol: TCP
          port: 6333
        - protocol: TCP
          port: 4318
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
