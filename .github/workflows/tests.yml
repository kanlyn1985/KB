name: Tests

on:
  push:
    paths-ignore:
      - "agent_kb_core/**"
      - ".github/workflows/agent-kb-core.yml"
  pull_request:
    paths-ignore:
      - "agent_kb_core/**"
      - ".github/workflows/agent-kb-core.yml"

concurrency:
  group: legacy-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run fast tests
        run: python -m pytest -m "not integration and not benchmark" --tb=short -q

  integration-tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run integration tests
        run: python -m pytest -m integration --tb=short -q

  benchmark-tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run benchmark tests
        run: python -m pytest -m benchmark --tb=short -q

  eval-suite:
    # Runs the Phase 1 evaluator (token-overlap) and asserts a minimum
    # pass rate. This remains a legacy-system gate and does not run for
    # agent_kb_core-only changes.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run evaluator unit tests
        run: python -m pytest tests/test_evaluator.py -v --tb=short

      - name: Run evaluator suite (smoke)
        run: python scripts/run_eval_suite.py --max-questions 20 --min-token-pass 0.20

  health-check:
    # Legacy KB health gate. Agent KB Core has its own isolated CI workflow.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run system health check
        run: python scripts/check_health.py

  requirement-program:
    # Requirement Resolver subsystem gate: unit tests + static audit + smoke.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Clean build artifacts
        run: |
          python -c "import shutil, pathlib; [shutil.rmtree(p, ignore_errors=True) for p in pathlib.Path('src').rglob('__pycache__')]"
          python -c "import shutil, pathlib; [shutil.rmtree(p, ignore_errors=True) for p in pathlib.Path('tests/requirement').rglob('__pycache__')]"

      - name: Run requirement unit tests
        run: python -m pytest tests/requirement/ -v --tb=short -q

      - name: Run requirement program audit
        run: python scripts/audit_requirement_program.py --repo-root .

      - name: Run requirement smoke gates
        run: python scripts/run_requirement_program.py --mode smoke
