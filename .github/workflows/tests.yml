name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run fast tests
        run: python -m pytest -m "not integration and not benchmark" --tb=short -q

  integration-tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run integration tests
        run: python -m pytest -m integration --tb=short -q

  benchmark-tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run benchmark tests
        run: python -m pytest -m benchmark --tb=short -q

  eval-suite:
    # Runs the Phase 1 evaluator (token-overlap) and asserts a minimum
    # pass rate.  This is the regression gate for system answer quality.
    # Uses --max-questions 20 for sample stability: the earlier 10-question
    # round-robin sample was too small to reflect real quality (it happened
    # to pick hard/degradation cases and never showed uplift from fixes whose
    # affected cases land outside the first 10). 20 questions (~6 min) gives
    # a more stable, honest signal. Full 87-question suite is run offline.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run evaluator unit tests
        run: python -m pytest tests/test_evaluator.py -v --tb=short

      - name: Run evaluator suite (smoke)
        run: python scripts/run_eval_suite.py --max-questions 20 --min-token-pass 0.20
        # Adjust --min-token-pass based on the baseline pass rate.
        # 0.20 is a conservative floor for smoke testing.

  health-check:
    # Runs the system health check to verify the KB is in a working state.
    # Use as a gate for deployments.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run system health check
        run: python scripts/check_health.py
        # Fails CI if any of the 10 health checks fail:
        # workspace_exists, db_file_exists, db_connect, active_documents,
        # facts_populated, evidence_populated, expected_points_populated,
        # fts_index_populated, fact_type_diversity, latest_eval_report_exists.

  requirement-program:
    # Requirement Resolver subsystem gate: unit tests + static audit +
    # end-to-end smoke. Runs independently of the KB1 main suite so a
    # requirement regression is visible without masking KB1 failures.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Clean build artifacts
        # Ensure a clean scan for the no-build-artifacts audit check.
        run: |
          python -c "import shutil, pathlib; [shutil.rmtree(p, ignore_errors=True) for p in pathlib.Path('src').rglob('__pycache__')]"
          python -c "import shutil, pathlib; [shutil.rmtree(p, ignore_errors=True) for p in pathlib.Path('tests/requirement').rglob('__pycache__')]"

      - name: Run requirement unit tests
        run: python -m pytest tests/requirement/ -v --tb=short -q

      - name: Run requirement program audit
        # Static audit: file presence, schema tables, syntax, orchestrator
        # gates, integration script safety. Exits nonzero on blocker failure.
        run: python scripts/audit_requirement_program.py --repo-root .

      - name: Run requirement smoke gates
        # End-to-end smoke: schema init, seed, resolver, diff, query, etc.
        run: python scripts/run_requirement_program.py --mode smoke