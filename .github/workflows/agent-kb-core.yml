name: Agent KB Core CI

on:
  pull_request:
    paths:
      - "agent_kb_core/**"
      - ".github/workflows/agent-kb-core.yml"
  push:
    branches:
      - main
      - rebuild/agent-kb-core
    paths:
      - "agent_kb_core/**"
      - ".github/workflows/agent-kb-core.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: agent-kb-core-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    defaults:
      run:
        working-directory: agent_kb_core

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: agent_kb_core/pyproject.toml

      - name: Upgrade packaging tools
        run: python -m pip install --quiet --upgrade pip setuptools wheel

      - name: Install Agent KB Core
        run: python -m pip install --quiet -e ".[dev]"

      - name: Compile Python sources
        run: python -m compileall -q src tests

      - name: Run test suite
        id: pytest
        shell: bash
        run: |
          set +e
          python -m pytest -q --tb=short > pytest-output.txt 2>&1
          status=$?
          cat pytest-output.txt
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload pytest output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output-${{ matrix.python-version }}
          path: agent_kb_core/pytest-output.txt
          if-no-files-found: error
          retention-days: 7

      - name: Fail when tests fail
        if: steps.pytest.outputs.exit_code != '0'
        run: exit 1
